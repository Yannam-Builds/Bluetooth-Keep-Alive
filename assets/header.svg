<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bluetooth Keep-Alive</title>
  <desc id="desc">Elegant dark repository header for Bluetooth Keep-Alive, a native Windows tray utility.</desc>
