  <text x="376" y="206" fill="#8b949e" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" letter-spacing="3.2">NATIVE WINDOWS TRAY UTILITY</text>
  <path d="M376 246H1018" stroke="#30363d"/>
  <text x="376" y="294" fill="#c9d1d9" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="28">Keeps Bluetooth audio awake with a silent high-frequency stream.</text>
  <text x="376" y="332" fill="#8b949e" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="19">No Electron · no WAV loop seams · system-tray control · generated transparent icon</text>
