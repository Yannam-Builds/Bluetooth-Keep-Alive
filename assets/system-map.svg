<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bluetooth Keep-Alive system map</title>
  <desc id="desc">Tray controls feed settings into a sine-wave generator, then into the selected Windows output device and Bluetooth hardware.</desc>
  <rect width="1200" height="360" fill="#0d1117"/>
  <rect x="48" y="48" width="1104" height="264" rx="26" fill="#0d1117" stroke="#30363d"/>
  <text x="82" y="101" fill="#ffffff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="760" letter-spacing=".6">SYSTEM MAP</text>
  <text x="82" y="134" fill="#8b949e" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17">A tiny native loop that keeps the audio path warm without opening a foreground window.</text>
  <g font-family="Segoe UI, Inter, Arial, sans-serif">
    <g transform="translate(84 188)">
      <rect width="210" height="76" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="105" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="650">Tray controls</text>
      <text x="105" y="57" text-anchor="middle" fill="#8b949e" font-size="14">frequency · volume · device</text>
    </g>
    <path d="M314 226H394" stroke="#8b949e" stroke-width="2" stroke-dasharray="8 8"/>
    <g transform="translate(414 188)">
      <rect width="210" height="76" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="105" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="650">Sine generator</text>
      <text x="105" y="57" text-anchor="middle" fill="#8b949e" font-size="14">18–22 kHz buffer</text>
    </g>
    <path d="M644 226H724" stroke="#8b949e" stroke-width="2" stroke-dasharray="8 8"/>
    <g transform="translate(744 188)">
      <rect width="210" height="76" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="105" y="34" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="650">Output device</text>
      <text x="105" y="57" text-anchor="middle" fill="#8b949e" font-size="14">default or selected</text>
    </g>
    <path d="M974 226H1054" stroke="#8b949e" stroke-width="2" stroke-dasharray="8 8"/>
    <g transform="translate(1070 204)">
      <circle cx="24" cy="22" r="20" fill="#161b22" stroke="#30363d"/>
      <path d="M24 9v26M24 9l10 8-10 6 10 7-10 5M24 22l-8-8M24 22l-8 8" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
