<svg viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bluetooth Keep-Alive</title>
  <desc id="desc">Social preview for the native Windows Bluetooth audio keep-alive utility.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(286 320) rotate(90) scale(300)">
      <stop stop-color="#0A84FF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" rx="36" fill="#070B12"/>
  <rect width="1280" height="640" rx="36" fill="url(#grid)"/>
  <rect width="640" height="640" fill="url(#glow)"/>
  <rect x="34" y="34" width="1212" height="572" rx="26" stroke="#FFFFFF" stroke-opacity=".12" stroke-width="2"/>

  <image href="./logo.png" x="28" y="54" width="524" height="524" preserveAspectRatio="xMidYMid meet"/>

  <circle cx="635" cy="160" r="6" fill="#58A6FF"/>
  <text x="657" y="167" fill="#8B949E" font-family="Cascadia Mono, Consolas, monospace" font-size="18" letter-spacing="3">NATIVE WINDOWS AUDIO UTILITY</text>
  <text x="630" y="290" fill="#FFFFFF" font-family="Geist, Avenir Next, Segoe UI, sans-serif" font-size="70" font-weight="750" letter-spacing="-2">Bluetooth</text>
  <text x="630" y="368" fill="#FFFFFF" font-family="Geist, Avenir Next, Segoe UI, sans-serif" font-size="70" font-weight="750" letter-spacing="-2">Keep-Alive</text>
  <text x="634" y="426" fill="#A5B1C2" font-family="Geist, Avenir Next, Segoe UI, sans-serif" font-size="26">Silent signal. Instant playback.</text>
  <text x="634" y="489" fill="#58A6FF" font-family="Cascadia Mono, Consolas, monospace" font-size="17" letter-spacing="2">18–22 kHz  ·  POP-FREE  ·  ZERO TELEMETRY</text>
  <path d="M634 527H1128" stroke="#30363D" stroke-width="2"/>
  <text x="634" y="566" fill="#8B949E" font-family="Cascadia Mono, Consolas, monospace" font-size="16">github.com/Yannam-Builds/Bluetooth-Keep-Alive</text>
</svg>
